server:
  port: 9091

spring:
  datasource:
    url: jdbc:h2:mem:inventorydb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
  thymeleaf:
    cache: false
  mail:
    host: smtp.gmail.com
    port: 587
    username: elan87767@gmail.com
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  security:
    two-factor:
      code-length: 6
      expiration-minutes: 10
    login-protection:
      max-attempts: 3
      lock-minutes: 15
    password-reset:
      code-length: 6
      expiration-minutes: 10

logging:
  level:
    org.hibernate.SQL: warn
