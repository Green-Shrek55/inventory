server:
  port: ${PORT:9092}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:inventorydb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:true}
      path: /h2-console
  thymeleaf:
    cache: false
  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  security:
    two-factor:
      enabled: false
      code-length: 6
      expiration-minutes: 10
    login-protection:
      max-attempts: 3
      lock-minutes: 15
    password-reset:
      code-length: 6
      expiration-minutes: 10

logging:
  level:
    org.hibernate.SQL: warn
