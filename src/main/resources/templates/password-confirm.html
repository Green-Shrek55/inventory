<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Подтверждение смены пароля</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <style>
        body {display:flex; align-items:center; justify-content:center; min-height:100vh;}
        .login-card {width:360px; padding:32px; box-shadow:0 10px 30px rgba(15,23,42,0.15); border-radius:12px; background:white;}
        .login-card h2 {margin-top:0;}
    </style>
</head>
<body>
<div class="login-card">
    <h2>Подтверждение смены пароля</h2>
    <p th:if="${infoMessage}" class="flash" th:text="${infoMessage}">Код отправлен.</p>
    <p>Код отправлен на <strong th:text="${maskedEmail}">a***n@example.com</strong>.</p>
    <p>Код действует <span th:text="${expiresInMinutes}">10</span> минут.</p>
    <form th:action="@{/password/confirm}" th:object="${codeForm}" method="post">
        <div th:if="${#fields.hasGlobalErrors()}" class="flash error" style="margin-top:0;">
            <p th:each="err : ${#fields.globalErrors()}" th:text="${err}">Ошибка</p>
        </div>
        <label for="code">Код подтверждения</label>
        <input id="code" type="text" th:field="*{code}" inputmode="numeric" maxlength="6" autofocus>
        <div th:if="${#fields.hasErrors('code')}" class="flash error" th:errors="*{code}">Ошибка</div>

        <label for="password">Новый пароль</label>
        <input id="password" type="password" th:field="*{password}">
        <div th:if="${#fields.hasErrors('password')}" class="flash error" th:errors="*{password}">Ошибка</div>

        <button type="submit" style="width:100%; margin-top:16px;">Сменить пароль</button>
    </form>
    <p><a th:href="@{/password/forgot}">Запросить новый код</a></p>
    <p><a th:href="@{/login}">Назад ко входу</a></p>
</div>
</body>
</html>
