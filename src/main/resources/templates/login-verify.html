<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Подтверждение входа</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <style>
        body {display:flex; align-items:center; justify-content:center; min-height:100vh;}
        .login-card {width:360px; padding:32px; box-shadow:0 10px 30px rgba(15,23,42,0.15); border-radius:12px; background:white;}
        .login-card h2 {margin-top:0;}
        .secondary-form {margin-top:12px;}
        .secondary-form button {width:100%;}
    </style>
</head>
<body>
<div class="login-card">
    <h2>Подтверждение входа</h2>
    <p th:if="${infoMessage}" class="flash" th:text="${infoMessage}">Код отправлен.</p>
    <p>Введите код, отправленный на <strong th:text="${maskedEmail}">a***n@example.com</strong>.</p>
    <p>Код действует <span th:text="${expiresInMinutes}">10</span> минут.</p>
    <form th:action="@{/login/verify}" method="post">
        <label for="code">Код подтверждения</label>
        <input id="code" type="text" name="code" inputmode="numeric" autocomplete="one-time-code" maxlength="6" autofocus>

        <button type="submit" style="width:100%; margin-top:16px;">Подтвердить вход</button>
    </form>
    <form th:action="@{/login/resend}" method="post" class="secondary-form">
        <button type="submit">Отправить код повторно</button>
    </form>
    <p th:if="${verifyError}" class="flash error" th:text="${verifyError}">Неверный код</p>
    <p><a th:href="@{/login/cancel}">Назад ко входу</a></p>
</div>
</body>
</html>
