<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Запрос кода для смены пароля</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <style>
        body {display:flex; align-items:center; justify-content:center; min-height:100vh;}
        .login-card {width:360px; padding:32px; box-shadow:0 10px 30px rgba(15,23,42,0.15); border-radius:12px; background:white;}
        .login-card h2 {margin-top:0;}
    </style>
</head>
<body>
<div class="login-card">
    <h2>Сброс пароля</h2>
    <form th:action="@{/password/forgot}" th:object="${requestForm}" method="post">
        <div th:if="${#fields.hasGlobalErrors()}" class="flash error" style="margin-top:0;">
            <p th:each="err : ${#fields.globalErrors()}" th:text="${err}">Ошибка</p>
        </div>
        <label for="usernameOrEmail">Логин или email</label>
        <input id="usernameOrEmail" type="text" th:field="*{usernameOrEmail}" autofocus>
        <div th:if="${#fields.hasErrors('usernameOrEmail')}" class="flash error" th:errors="*{usernameOrEmail}">Ошибка</div>

        <button type="submit" style="width:100%; margin-top:16px;">Отправить код</button>
    </form>
    <p><a th:href="@{/login}">Назад ко входу</a></p>
</div>
</body>
</html>
