<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Админ · Пользователи</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="admin-shell">
    <aside th:replace="~{admin/fragments/sidebar :: sidebar('users')}"></aside>
    <main class="admin-main" data-remember-scroll>
        <header class="page-header">
            <div>
                <h1>Пользователи</h1>
            </div>
            <div class="page-header-actions">
                <a class="btn" th:href="@{/admin/users/new}">+ Создать</a>
                <a class="btn ghost" th:href="@{/logout}">Выход</a>
            </div>
        </header>

        <div th:if="${message}" class="flash" th:text="${message}">Message</div>
        <div th:if="${error}" class="flash error" th:text="${error}">Error</div>

        <div class="card">
            <table>
                <thead>
                <tr>
                    <th>Логин</th>
                    <th>Email</th>
                    <th>Роль</th>
                    <th>Статус</th>
                    <th>Действия</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="user : ${users}">
                    <td th:text="${user.username}">admin</td>
                    <td th:text="${user.email}">admin@example.com</td>
                    <td th:text="${user.role.name() == 'ADMIN' ? 'Администратор' : (user.role.name() == 'WAREHOUSE' ? 'Материально ответственное лицо' : (user.role.name() == 'ECONOMIST' ? 'Экономист' : 'Руководитель'))}">ADMIN</td>
                    <td th:text="${user.enabled ? 'Активен' : 'Отключен'}">Активен</td>
                    <td>
                        <a th:href="@{|/admin/users/${user.id}/edit|}">Изменить</a>
                        <form th:action="@{|/admin/users/${user.id}/delete|}" method="post" class="inline"
                              onsubmit="return confirm('Удалить пользователя?');">
                            <button type="submit" class="danger">Удалить</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(users)}">
                    <td colspan="5">Пользователей нет</td>
                </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>
<script th:src="@{/js/scroll-restore.js}"></script>
</body>
</html>
